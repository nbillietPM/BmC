  # --------------------------------------------------------------------
  # CHELSA DATASETS (High-Resolution Climatologies)
  # --------------------------------------------------------------------
  chelsa:
    enabled: true
    catalog_path:  "C:/Users/niels/Documents/Repositories/BmC/meta/chelsa_gp_stac/chelsa_master.parquet"
    levels: 
      # --- DAILY TIME SERIES (Inherits global 'temporal' block) ---
      daily:
        include: true
        variables:
          tas: true     # Mean daily air temperature
          tasmax: false # Maximum daily air temperature
          tasmin: false # Minimum daily air temperature
          pr: false     # Daily precipitation amount
          clt: false    # Cloud area fraction
          rsds: false   # Surface downwelling shortwave radiation
          sfcWind: false # Near-surface wind speed
          hurs: false   # Near-surface relative humidity
          vpd: false    # Vapor pressure deficit

      # --- MONTHLY TIME SERIES (Inherits global 'temporal' block) ---
      monthly:
        include: true
        variables:
          tas: true
          tasmax: false
          tasmin: false
          pr: true
          clt: false
          rsds: false
          sfcWind: false
          hurs: false
          vpd: true

      # --- ANNUAL TIME SERIES (Inherits global 'temporal' block) ---
      annual:
        include: true
        variables:
          tas: true
          tasmax: false
          tasmin: false
          pr: false

      # --- CLIMATOLOGIES (30-year normals, Overrides global 'temporal' block) ---
      climatologies:
        include: false
        
        # Select Base Periods / Projection Horizons
        time_ranges:
          "1981-2010": true  # Historical observation baseline
          "2011-2040": false # Near-term future
          "2041-2070": false # Mid-term future
          "2071-2100": false # Long-term future
        
        # Select Climate Models (CMIP6 Ensembles)
        ensembles:
          historical: true   # REQUIRED if "1981-2010" is true
          GFDL-ESM4: false
          IPSL-CM6A-LR: false
          MPI-ESM1-2-HR: false
          MRI-ESM2-0: false
          UKESM1-0-LL: false
        
        # Select Emission Scenarios (SSPs)
        scenarios:
          historical: true   # REQUIRED if "1981-2010" is true
          ssp126: false      # Highly optimistic / Strong mitigation
          ssp370: false      # Middle of the road
          ssp585: false      # Highly pessimistic / Fossil-fueled development
          
        # Select Climatological Variables (Long-term averages of core variables)
        variables:
          tas: true     # Mean air temperature
          tasmax: false # Maximum air temperature
          tasmin: false # Minimum air temperature
          pr: true      # Precipitation amount
          clt: false    # Cloud area fraction
          hurs: false   # Near-surface relative humidity
          rsds: false   # Surface downwelling shortwave radiation
          sfcWind: false # Near-surface wind speed
          vpd: false    # Vapor pressure deficit
          pet: false    # Potential evapotranspiration
          cmi: false    # Climate moisture index
          swb: false    # Site water balance
          swe: false    # Snow water equivalent

      # --- BIOCLIMATIC VARIABLES (Overrides global 'temporal' block) ---
      bioclim:
        include: true
        
        # Select Base Periods / Projection Horizons
        time_ranges:
          "1981-2010": true  # Historical observation baseline
          "2011-2040": true  # Near-term future
          "2041-2070": false # Mid-term future
          "2071-2100": false # Long-term future
        
        # Select Climate Models (CMIP6 Ensembles)
        ensembles:
          historical: true   # REQUIRED if "1981-2010" is true
          GFDL-ESM4: true
          IPSL-CM6A-LR: false
          MPI-ESM1-2-HR: false
          MRI-ESM2-0: false
          UKESM1-0-LL: false
        
        # Select Emission Scenarios (SSPs)
        scenarios:
          historical: true   # REQUIRED if "1981-2010" is true
          ssp126: true       # Highly optimistic / Strong mitigation
          ssp370: false      # Middle of the road
          ssp585: false      # Highly pessimistic / Fossil-fueled development
          
        # --------------------------------------------------------------
        # EXHAUSTIVE BIOCLIMATIC VARIABLES (CHELSA V2.1)
        # Set to 'true' to include, 'false' or delete the line to exclude
        # --------------------------------------------------------------
        variables:
          # --- Standard Temperature & Precipitation (Bio01 - Bio19) ---
          bio01: true   # Annual Mean Temperature
          bio02: false  # Mean Diurnal Range
          bio03: false  # Isothermality
          bio04: false  # Temperature Seasonality
          bio05: false  # Max Temperature of Warmest Month
          bio06: false  # Min Temperature of Coldest Month
          bio07: false  # Temperature Annual Range
          bio08: false  # Mean Temperature of Wettest Quarter
          bio09: false  # Mean Temperature of Driest Quarter
          bio10: false  # Mean Temperature of Warmest Quarter
          bio11: false  # Mean Temperature of Coldest Quarter
          bio12: true   # Annual Precipitation
          bio13: false  # Precipitation of Wettest Month
          bio14: false  # Precipitation of Driest Month
          bio15: false  # Precipitation Seasonality (CV)
          bio16: false  # Precipitation of Wettest Quarter
          bio17: false  # Precipitation of Driest Quarter
          bio18: false  # Precipitation of Warmest Quarter
          bio19: false  # Precipitation of Coldest Quarter

          # --- Growing Season & Degree Days ---
          gsl: false      # Growing season length
          gsp: false      # Growing season precipitation
          gst: false      # Growing season temperature
          gdd0: false     # Growing degree days above 0C
          gdd5: false     # Growing degree days above 5C
          gdd10: false    # Growing degree days above 10C
          gddlgd0: false  # Growing degree days during length of growing period (>0C)
          gddlgd5: false  # Growing degree days during length of growing period (>5C)
          gddlgd10: false # Growing degree days during length of growing period (>10C)
          gdgfgd5: false  # Growing degree days until first frost (>5C)
          gdgfgd10: false # Growing degree days until first frost (>10C)
          lgd: false      # Length of growing period
          ngd0: false     # Number of growing days (>0C)
          ngd5: false     # Number of growing days (>5C)
          ngd10: false    # Number of growing days (>10C)
          fgd: false      # First frost day
          fcf: false      # Frost change frequency

          # --- Vapor Pressure Deficit (VPD) ---
          vpdmean: false
          vpdmin: false
          vpdmax: false
          vpdrange: false

          # --- Potential Evapotranspiration (PET) & Moisture ---
          petmean: false
          petmin: false
          petmax: false
          petrange: false
          cmimean: false  # Climate Moisture Index (Mean)
          cmimin: false
          cmimax: false
          cmirange: false
          swb: false      # Site Water Balance
          
          # --- Humidity & Cloud Cover ---
          hursmean: false # Relative Humidity (Mean)
          hursmin: false
          hursmax: false
          hursrange: false
          cltmean: false  # Cloud Area Fraction (Mean)
          cltmin: false
          cltmax: false
          cltrange: false

          # --- Radiation & Wind ---
          rsdsmean: false # Surface Downwelling Shortwave Radiation (Mean)
          rsdsmin: false
          rsdsmax: false
          rsdsrange: false
          sfcWindmean: false # Near-surface wind speed (Mean)
          sfcWindmin: false
          sfcWindmax: false
          sfcWindrange: false

          # --- Snow & Productivity ---
          swe: false      # Snow Water Equivalent
          scd: false      # Snow Cover Days
          npp: false      # Net Primary Productivity

          # --- Köppen-Geiger Climate Classifications ---
          kg0: false
          kg1: false
          kg2: false
          kg3: false
          kg4: false
          kg5: false