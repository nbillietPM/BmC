base_dir: "./test_outputs/"
cube_name: "dev_cube"

export_as:
  format: "zarr"
# ======================================================================
# 1. SPATIAL & TEMPORAL SELECTION
# ======================================================================
spatial:
  target_grid: "EEA"
  target_resolution: "1km"
  use_bbox: true  
  bbox: #Flanders bbox
      long_min: 2.591733
      long_max: 5.883999
      lat_min: 50.680797
      lat_max: 51.963900
temporal:
  start_year: 2004  #start year of the european invasion of the asian hornet
  start_month: 1
  end_year: 2025
  end_month: 12
  time_aggregation: "monthly"

# ======================================================================
# 2. DATA SOURCES
# ======================================================================
sources:
  gbif:
    # return the non cubed point data with a threshold uncertainty value
    # if set to false, the sql query automatically resorts to matching with the grid specs of the recipe
    # EEA will be matched with EEA grid, WSG84 & Global_EqualArea are matched to the DSMG grid
    return_raw: 
      enabled: false 
      coordinateUncertainty: 1000
    vector_processing:
      data_type: "discrete" # "discrete" or "continuous"
      method: "intersect"   # "intersect" or "kdtree"
    query_filters:
      # General taxonKey parser, accepts keys from all taxonomic levels
      taxon_keys: ['G59D','4F6YZ','3Y9W2','5B9T3','4HPXM','3Y9VW','75SVV','3ZW55','3ZDRX','6CJDB','GGZL','6JYHZ','7G3C6']
      # Fetcha all occurrence data in AOI     
      fetch_all_taxa: false
      # Options: "presence", "absence", or "mixed" (both)
      record_type: "presence"
      # If left blank, this defaults to matching the spatial.target_resolution (in meters)
      default_Uncertainty: 1000 
      exclude_issues:
        - "ZERO_COORDINATE"
        - "COORDINATE_OUT_OF_RANGE"
        - "COUNTRY_COORDINATE_MISMATCH" 
    taxonomy:
      # Include multiple taxonomic identifiers up to lowest level. Species is always included
      # Smallest can be kingdom (kingdom, phylum, class, order, family, genus)
      # If the field is left empty the species key will be the only identifier in the end table
      col_backbone: true
      lowest_level:
    columns : ["year", "month"]
    aggregate:
      return_count: true
      return_nmbObservers: true

  # --------------------------------------------------------------------
  # WEkEO DATASETS (Copernicus Land Monitoring Service)
  # --------------------------------------------------------------------
  wekeo:
    enabled: false
    dataset_resolution: "250m" # Fetches the finest raw data before upscaling/downscaling
    catalog_path: 
    # ------------------------------------------------------------------
    # GLOBAL DEFAULTS for WEkEO
    # If a dataset below doesn't specify an override, it inherits these.
    # ------------------------------------------------------------------
    defaults:
      continuous_aggregations: 
        - "average"
        - "max"
        - "min"
        - "rms"
      discrete_classes: "all" # Instructs the engine to fetch every available class

    # ------------------------------------------------------------------
    # DATA INVENTORY (Grouped by GeoParquet 'collection' Keys)
    # ------------------------------------------------------------------
    categories:
      # --- Tree Cover & Forest (TCF) ---
      TCF:
        include: true
        datasets:
          Tree_Cover_Density:
            include: true
            type: "continuous"
          
          Forest_Type:
            include: true
            type: "discrete"
            # OVERRIDE: We only want specific classes
            classes:
              - "Broadleaved_forest"
              - "Coniferous_forest"
              
          Dominant_Leaf_Type:
            include: false
            type: "discrete"
            
          Broadleaved_Cover_Density:
            include: false
            type: "continuous"
            
          Coniferous_Cover_Density:
            include: false
            type: "continuous"
            
          Forest_Additional_Support_Layer:
            include: false
            type: "discrete"
            
          # Confidence Layers
          Tree_Cover_Density_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]
            
          Dominant_Leaf_Type_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]

      # --- Grassland (GRA) ---
      GRA:
        include: true
        datasets:
          Grassland:
            include: true
            type: "discrete"
            
          Herbaceous_Cover:
            include: false
            type: "continuous"
            
          Ploughing_Indicator:
            include: false
            type: "discrete"
            
          Grassland_Mowing_Events:
            include: false
            type: "discrete"
            
          Grassland_Mowing_Dates:
            include: false
            type: "discrete"
            
          # Confidence Layers
          Grassland_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]
            
          Grassland_Mowing_Events_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]

      # --- Imperviousness (IMP) ---
      IMP:
        include: false
        datasets:
          Imperviousness_Density:
            include: true
            type: "continuous"
            
          Impervious_Built_up:
            include: false
            type: "discrete"
            
          Share_of_Built_up:
            include: false
            type: "continuous"
            
          # Confidence Layers
          Confidence_layer_for_Imperviousness_Density:
            include: false
            type: "continuous"
            aggregations: ["average"]
            
          Confidence_layer_for_Impervious_Built_up:
            include: false
            type: "continuous"
            aggregations: ["average"]

      # --- Small Woody Features (SLF) ---
      SLF:
        include: false
        datasets:
          Small_Woody_Features:
            include: true
            type: "discrete"
            
          Woody_Vegetation_Layer:
            include: false
            type: "discrete"
            
          Forest_Mask:
            include: false
            type: "discrete"
            
          Crop_Mask:
            include: false
            type: "discrete"

      # --- Cropland (CRL) ---
      CRL:
        include: false
        datasets:
          Crop_Types:
            include: true
            type: "discrete"
            
          Cropping_Seasons_Yearly:
            include: false
            type: "discrete"
            
          Fallow_Land_Presence:
            include: false
            type: "discrete"
            
          Bare_Soil_Before:
            include: false
            type: "discrete"
            
          Bare_Soil_After:
            include: false
            type: "discrete"
            
          Main_Crop_Emergence:
            include: false
            type: "discrete"
            
          Main_Crop_Harvest:
            include: false
            type: "discrete"
            
          Main_Crop_Duration:
            include: false
            type: "continuous"
            
          Secondary_Crops_Type:
            include: false
            type: "discrete"
            
          Secondary_Crops_Emergence:
            include: false
            type: "discrete"
            
          Secondary_Crops_Duration:
            include: false
            type: "continuous"
            
          # Confidence Layers
          Crop_Types_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]
            
          Fallow_Land_Presence_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]
            
          Bare_Soil_Before_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]
            
          Bare_Soil_After_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]
            
          Main_Crop_Emergence_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]
            
          Main_Crop_Harvest_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]
            
          Main_Crop_Duration_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]
            
          Secondary_Crops_Duration_Confidence_Layer:
            include: false
            type: "continuous"
            aggregations: ["average"]

      # --- CORINE Land Cover ---
      CORINE:
        include: false
        datasets:
          Corine_Land_Cover_2018:
            include: true
            type: "discrete"
            
          Corine_Land_Cover_2012:
            include: false
            type: "discrete"
            
          Corine_Land_Cover_2006:
            include: false
            type: "discrete"
            
          Corine_Land_Cover_2000:
            include: false
            type: "discrete"
            
          Corine_Land_Cover_1990:
            include: false
            type: "discrete"

  # --------------------------------------------------------------------
  # CHELSA DATASETS (High-Resolution Climatologies)
  # --------------------------------------------------------------------
  chelsa:
    enabled: true
    catalog_path:  "C:/Users/niels/Documents/Repositories/BmC/meta/chelsa_gp_stac/chelsa_master.parquet"
    levels: 
      # --- DAILY TIME SERIES (Inherits global 'temporal' block) ---
      daily:
        include: true
        variables:
          tas: true     # Mean daily air temperature
          tasmax: false # Maximum daily air temperature
          tasmin: false # Minimum daily air temperature
          pr: false     # Daily precipitation amount
          clt: false    # Cloud area fraction
          rsds: false   # Surface downwelling shortwave radiation
          sfcWind: false # Near-surface wind speed
          hurs: false   # Near-surface relative humidity
          vpd: false    # Vapor pressure deficit

      # --- MONTHLY TIME SERIES (Inherits global 'temporal' block) ---
      monthly:
        include: true
        variables:
          tas: true
          tasmax: false
          tasmin: false
          pr: true
          clt: false
          rsds: false
          sfcWind: false
          hurs: false
          vpd: true

      # --- ANNUAL TIME SERIES (Inherits global 'temporal' block) ---
      annual:
        include: true
        variables:
          tas: true
          tasmax: false
          tasmin: false
          pr: false

      # --- CLIMATOLOGIES (30-year normals, Overrides global 'temporal' block) ---
      climatologies:
        include: false
        
        # Select Base Periods / Projection Horizons
        time_ranges:
          "1981-2010": true  # Historical observation baseline
          "2011-2040": false # Near-term future
          "2041-2070": false # Mid-term future
          "2071-2100": false # Long-term future
        
        # Select Climate Models (CMIP6 Ensembles)
        ensembles:
          historical: true   # REQUIRED if "1981-2010" is true
          GFDL-ESM4: false
          IPSL-CM6A-LR: false
          MPI-ESM1-2-HR: false
          MRI-ESM2-0: false
          UKESM1-0-LL: false
        
        # Select Emission Scenarios (SSPs)
        scenarios:
          historical: true   # REQUIRED if "1981-2010" is true
          ssp126: false      # Highly optimistic / Strong mitigation
          ssp370: false      # Middle of the road
          ssp585: false      # Highly pessimistic / Fossil-fueled development
          
        # Select Climatological Variables (Long-term averages of core variables)
        variables:
          tas: true     # Mean air temperature
          tasmax: false # Maximum air temperature
          tasmin: false # Minimum air temperature
          pr: true      # Precipitation amount
          clt: false    # Cloud area fraction
          hurs: false   # Near-surface relative humidity
          rsds: false   # Surface downwelling shortwave radiation
          sfcWind: false # Near-surface wind speed
          vpd: false    # Vapor pressure deficit
          pet: false    # Potential evapotranspiration
          cmi: false    # Climate moisture index
          swb: false    # Site water balance
          swe: false    # Snow water equivalent

      # --- BIOCLIMATIC VARIABLES (Overrides global 'temporal' block) ---
      bioclim:
        include: true
        
        # Select Base Periods / Projection Horizons
        time_ranges:
          "1981-2010": true  # Historical observation baseline
          "2011-2040": true  # Near-term future
          "2041-2070": false # Mid-term future
          "2071-2100": false # Long-term future
        
        # Select Climate Models (CMIP6 Ensembles)
        ensembles:
          historical: true   # REQUIRED if "1981-2010" is true
          GFDL-ESM4: true
          IPSL-CM6A-LR: false
          MPI-ESM1-2-HR: false
          MRI-ESM2-0: false
          UKESM1-0-LL: false
        
        # Select Emission Scenarios (SSPs)
        scenarios:
          historical: true   # REQUIRED if "1981-2010" is true
          ssp126: true       # Highly optimistic / Strong mitigation
          ssp370: false      # Middle of the road
          ssp585: false      # Highly pessimistic / Fossil-fueled development
          
        # --------------------------------------------------------------
        # EXHAUSTIVE BIOCLIMATIC VARIABLES (CHELSA V2.1)
        # Set to 'true' to include, 'false' or delete the line to exclude
        # --------------------------------------------------------------
        variables:
          # --- Standard Temperature & Precipitation (Bio01 - Bio19) ---
          bio01: true   # Annual Mean Temperature
          bio02: false  # Mean Diurnal Range
          bio03: false  # Isothermality
          bio04: false  # Temperature Seasonality
          bio05: false  # Max Temperature of Warmest Month
          bio06: false  # Min Temperature of Coldest Month
          bio07: false  # Temperature Annual Range
          bio08: false  # Mean Temperature of Wettest Quarter
          bio09: false  # Mean Temperature of Driest Quarter
          bio10: false  # Mean Temperature of Warmest Quarter
          bio11: false  # Mean Temperature of Coldest Quarter
          bio12: true   # Annual Precipitation
          bio13: false  # Precipitation of Wettest Month
          bio14: false  # Precipitation of Driest Month
          bio15: false  # Precipitation Seasonality (CV)
          bio16: false  # Precipitation of Wettest Quarter
          bio17: false  # Precipitation of Driest Quarter
          bio18: false  # Precipitation of Warmest Quarter
          bio19: false  # Precipitation of Coldest Quarter

          # --- Growing Season & Degree Days ---
          gsl: false      # Growing season length
          gsp: false      # Growing season precipitation
          gst: false      # Growing season temperature
          gdd0: false     # Growing degree days above 0C
          gdd5: false     # Growing degree days above 5C
          gdd10: false    # Growing degree days above 10C
          gddlgd0: false  # Growing degree days during length of growing period (>0C)
          gddlgd5: false  # Growing degree days during length of growing period (>5C)
          gddlgd10: false # Growing degree days during length of growing period (>10C)
          gdgfgd5: false  # Growing degree days until first frost (>5C)
          gdgfgd10: false # Growing degree days until first frost (>10C)
          lgd: false      # Length of growing period
          ngd0: false     # Number of growing days (>0C)
          ngd5: false     # Number of growing days (>5C)
          ngd10: false    # Number of growing days (>10C)
          fgd: false      # First frost day
          fcf: false      # Frost change frequency

          # --- Vapor Pressure Deficit (VPD) ---
          vpdmean: false
          vpdmin: false
          vpdmax: false
          vpdrange: false

          # --- Potential Evapotranspiration (PET) & Moisture ---
          petmean: false
          petmin: false
          petmax: false
          petrange: false
          cmimean: false  # Climate Moisture Index (Mean)
          cmimin: false
          cmimax: false
          cmirange: false
          swb: false      # Site Water Balance
          
          # --- Humidity & Cloud Cover ---
          hursmean: false # Relative Humidity (Mean)
          hursmin: false
          hursmax: false
          hursrange: false
          cltmean: false  # Cloud Area Fraction (Mean)
          cltmin: false
          cltmax: false
          cltrange: false

          # --- Radiation & Wind ---
          rsdsmean: false # Surface Downwelling Shortwave Radiation (Mean)
          rsdsmin: false
          rsdsmax: false
          rsdsrange: false
          sfcWindmean: false # Near-surface wind speed (Mean)
          sfcWindmin: false
          sfcWindmax: false
          sfcWindrange: false

          # --- Snow & Productivity ---
          swe: false      # Snow Water Equivalent
          scd: false      # Snow Cover Days
          npp: false      # Net Primary Productivity

          # --- Köppen-Geiger Climate Classifications ---
          kg0: false
          kg1: false
          kg2: false
          kg3: false
          kg4: false
          kg5: false