          Woody_Vegetation_Layer:
            include: false
            type: "discrete"
            
          Forest_Mask:
            include: false
            type: "discrete"
            
          Crop_Mask:
            include: false
            type: "discrete"

      # --- Cropland (CRL) ---
      CRL:
        include: false
        datasets:
          Crop_Types:
            include: true
            type: "discrete"
            
          Cropping_Seasons_Yearly:
            include: false
            type: "discrete"
            
          Fallow_Land_Presence:
            include: false
            type: "discrete"
            
          Bare_Soil_Before:
            include: false
            type: "discrete"
            
          Bare_Soil_After:
            include: false
            type: "discrete"
            
          Main_Crop_Emergence:
            include: false
