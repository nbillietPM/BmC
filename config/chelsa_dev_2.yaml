base_dir: "./test_outputs/"
cube_name: "dev_geoparquet_test"

# ======================================================================
# 1. SPATIAL & TEMPORAL SELECTION
# ======================================================================
spatial:
  target_grid: "EEA"
  target_resolution: "1km"
  use_bbox: true  
  bbox:
      long_min: 4.24
      long_max: 4.48
      lat_min: 50.76
      lat_max: 50.91

temporal:
  start_year: 2000
  start_month: 1
  end_year: 2000
  end_month: 2 # Just two months to keep the continuous queue small

# ======================================================================
# 2. DATA SOURCES
# ======================================================================
sources:
  # Disable WEkEO to purely test the CHELSA GeoParquet execution plan
  wekeo:
    enabled: false 

  chelsa:
    enabled: true
    # --- CRITICAL: Point this to your newly generated Parquet file ---
    catalog_path: "../../../meta/chelsa_gp_stac/chelsa_master.parquet"
    
    levels:
      # --- 1. Test Continuous Time Series (Daily/Monthly) ---
      daily:
        include: true
        variables:
          tas: true     # Mean daily air temperature
          pr: false

      monthly:
        include: true
        variables:
          tas: false
          pr: true      # Monthly precipitation

      annual:
        include: false  # Skip to save terminal output space

      # --- 2. Test Projection Metadata Filtering (Climatologies) ---
      climatologies:
        include: true
        time_ranges:
          "1981-2010": false # Disabled to force future projection tests
          "2041-2070": true  # Mid-term future
          "2071-2100": true  # Long-term future
        ensembles:
          historical: false  
          GFDL-ESM4: true    # Test Model 1
          MPI-ESM1-2-HR: true # Test Model 2
        scenarios:
          historical: false  
          ssp126: true       # Highly optimistic scenario
          ssp585: true       # Highly pessimistic scenario
        variables:
          tas: true     # 30-year average air temperature

      # --- 3. Test Projection Metadata Filtering (Bioclim) ---
      bioclim:
        include: true
        time_ranges:
          "1981-2010": true  # Mix of Historical...
          "2011-2040": true  # ...and Near-term future
        ensembles:
          historical: true   
          UKESM1-0-LL: true  # Test Model 3
        scenarios:
          historical: true   
          ssp370: true       # Middle of the road scenario
        variables:
          bio01: true   # Annual Mean Temperature
          bio12: true   # Annual Precipitation