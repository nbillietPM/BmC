cube_dir: "out/techDemo_cube/"
cube_name: "techDemo"

spatial:
  # select the method which should be employed
  method: "bbox"
  bbox:
    long_min: 3.510132
    long_max: 4.795532
    lat_min: 50.675576
    lat_max: 51.455718
  polygon:
    shapefile_path: "/shapefile/filename.shp"

layers:
  chelsa:
    enabled: true
    chelsa_month:
      enabled: true
      time:
        start_year: 2018
        start_month: 1
        end_year: 2018
        end_month: 12
        year_range: [1979, 2020]  # Optional: for fallback or metadata only
      variables:
        include_all: true
        included: []       # Ignored if include_all is true
        excluded: []
      source:
        base_url: "https://os.zhdk.cloud.switch.ch/chelsav2/GLOBAL/monthly"
        version: "V.2.1"  # Optional data version tag

    chelsa_clim_ref_period:
      enabled: true
      time:
        year_range: "1981-2010"
      variables:
        include_all: all
        included: []
        excluded: []
      source:
        base_url: "https://os.zhdk.cloud.switch.ch/chelsav2/GLOBAL/climatologies/1981-2010"
        version: "V.2.1"
    
    chelsa_clim_ref_month:
      enabled: true
      time:
        include_all: true
        included: []
        excluded: []
        year_range: "1981-2010"
      variables:
        include_all: true
        included: []
        excluded: []
      source:
        base_url: "https://os.zhdk.cloud.switch.ch/chelsav2/GLOBAL/climatologies/1981-2010"
        version: "V.2.1"
    
    chelsa_clim_sim_period:
      enabled: true
      time:
        include_all: true
        included: []
        excluded: []
      variables:
        include_all: true
        included: []
        excluded: []
      model:
        include_all: true
        included: []
        excluded: []
      scenario:
        include_all: true
        included: []
        excluded: []
      source:
        base_url: "https://os.zhdk.cloud.switch.ch/chelsav2/GLOBAL/climatologies"
        version: "V.2.1"

    chelsa_clim_sim_month:
      enabled: true
      time:
        year_ranges:
          include_all: true
          included: []
          excluded: []
        months:
          include_all: true
          included: [1]
          excluded: []
      variables:
        include_all: true
        included: []
        excluded: []
      model:
        include_all: true
        included: []
        excluded: []
      scenario:
        include_all: true
        included: []
        excluded: []
      source:
        base_url: "https://os.zhdk.cloud.switch.ch/chelsav2/GLOBAL/climatologies"
        version: "V.2.1"