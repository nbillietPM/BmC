base_dir: "./test_outputs/"
cube_name: "chelsa_stress_test"
wekeo_lake: ""

# ======================================================================
# 1. SPATIAL & TEMPORAL SELECTION
# ======================================================================
spatial:
  target_grid: "EEA"
  target_resolution: "100m"
  use_bbox: true  
  bbox:
      long_min: 4.24
      long_max: 4.750753
      lat_min: 50.548590
      lat_max: 50.91

temporal:
  start_year: 2000
  start_month: 1
  end_year: 2000
  end_month: 2

resampling:
  continuous: 
    - "average"
    - "max"
    - "min"
    - "rms"
  discrete: "coverage" 

# ======================================================================
# 2. DATA SOURCES
# ======================================================================
sources:
  # --------------------------------------------------------------------
  # WEkEO DATASETS (Copernicus Land Monitoring Service)
  # --------------------------------------------------------------------
  wekeo:
    enabled: true
    query_resolution: "highest"
    datasets:
      TCF:
        include: true
        productTypes:
          "Tree Cover Density": true
          "Forest Type": true
          "Dominant Leaf Type": false
          "Broadleaved Cover Density": false
          "Coniferous Cover Density": false
          "Forest Additional Support Layer": false
          "Tree Cover Density Confidence Layer": false
          "Dominant Leaf Type Confidence Layer": false

      GRA:
        include: true
        productTypes:
          "Grassland": true
          "Herbaceous Cover": false
          "Ploughing Indicator": false
          "Grassland Mowing Events": false
          "Grassland Mowing Dates (4 Dates per Year)": false
          "Grassland Confidence Layer": false
          "Grassland Mowing Events Confidence Layer": false

      IMP:
        include: false
        productTypes:
          "Imperviousness Density": true
          "Impervious Built-up": false
          "Share of Built-up": false
          "Confidence layer for Imperviousness Density": false
          "Confidence layer for Impervious Built-up": false

      SLF:
        include: false
        productTypes:
          "Small Woody Features": true
          "Woody Vegetation Layer": false
          "Forest Mask": false
          "Crop Mask": false

      CRL:
        include: false
        productTypes:
          "Crop Types": true
          "Cropping Seasons Yearly": false
          "Fallow Land Presence": false
          "Bare Soil Before": false
          "Bare Soil After": false
          "Main Crop Emergence": false
          "Main Crop Harvest": false
          "Main Crop Duration": false
          "Secondary Crops Type": false
          "Secondary Crops Emergence": false
          "Secondary Crops Duration": false
          "Crop Types Confidence Layer": false
          "Fallow Land Presence Confidence Layer": false
          "Bare Soil Before Confidence Layer": false
          "Bare Soil After Confidence Layer": false
          "Main Crop Emergence Confidence Layer": false
          "Main Crop Harvest Confidence Layer": false
          "Main Crop Duration Confidence Layer": false
          "Secondary Crops Duration Confidence Layer": false

      CORINE:
        include: false
        productTypes:
          "Corine Land Cover 2018": true
          "Corine Land Cover 2012": false
          "Corine Land Cover 2006": false
          "Corine Land Cover 2000": false
          "Corine Land Cover 1990": false

  # --------------------------------------------------------------------
  # CHELSA DATASETS (High-Resolution Climatologies) - MAXED STRESS TEST
  # --------------------------------------------------------------------
  chelsa:
    enabled: true
    levels:
      
      # --- DAILY TIME SERIES (All variables active) ---
      daily:
        include: true
        variables:
          tas: true     
          tasmax: true  
          tasmin: true  
          pr: true      
          clt: true    
          rsds: true   
          sfcWind: true 
          hurs: true   
          vpd: true    

      # --- MONTHLY TIME SERIES (All variables active) ---
      monthly:
        include: true
        variables:
          tas: true
          tasmax: true
          tasmin: true
          pr: true
          clt: true
          rsds: true
          sfcWind: true
          hurs: true
          vpd: true

      # --- ANNUAL TIME SERIES (All variables active) ---
      annual:
        include: true
        variables:
          tas: true
          tasmax: true
          tasmin: true
          pr: true

      # --- CLIMATOLOGIES (Maxed Time Ranges, GCMs, Scenarios, and Variables) ---
      climatologies:
        include: true
        
        time_ranges:
          "1981-2010": true  
          "2011-2040": true  
          "2041-2070": true 
          "2071-2100": true 
        
        ensembles:
          historical: true   
          GFDL-ESM4: true    
          IPSL-CM6A-LR: true
          MPI-ESM1-2-HR: true
          MRI-ESM2-0: true
          UKESM1-0-LL: true
        
        scenarios:
          historical: true   
          ssp126: true       
          ssp370: true      
          ssp585: true       
          
        variables:
          tas: true     
          tasmax: true  
          tasmin: true  
          pr: true      
          clt: true    
          hurs: true   
          rsds: true   
          sfcWind: true 
          vpd: true    
          pet: true    
          cmi: true    
          swb: true    
          swe: true    

      # --- BIOCLIMATIC VARIABLES (Maxed Core Suite, Growing Seasons, & Extended Summaries) ---
      bioclim:
        include: true
        
        time_ranges:
          "1981-2010": true  
          "2011-2040": true  
          "2041-2070": true 
          "2071-2100": true 
        
        ensembles:
          historical: true   
          GFDL-ESM4: true
          IPSL-CM6A-LR: true
          MPI-ESM1-2-HR: true
          MRI-ESM2-0: true
          UKESM1-0-LL: true
        
        scenarios:
          historical: true   
          ssp126: true       
          ssp370: true      
          ssp585: true       
          
        variables:
          # Standard Core Suite
          bio01: true   
          bio02: true   
          bio03: true   
          bio04: true   
          bio05: true   
          bio06: true   
          bio07: true   
          bio08: true  
          bio09: true  
          bio10: true  
          bio11: true  
          bio12: true   
          bio13: true   
          bio14: true   
          bio15: true   
          bio16: true  
          bio17: true  
          bio18: true  
          bio19: true  

          # Advanced Suite (Growing Seasons & Degree Days)
          gsl: true       
          gsp: true       
          gst: true       
          gdd0: true     
          gdd5: true     
          gdd10: true    
          gddlgd0: true  
          gddlgd5: true  
          gddlgd10: true 
          gdgfgd5: true  
          gdgfgd10: true 
          lgd: true      
          ngd0: true     
          ngd5: true     
          ngd10: true    
          fcf: true      
          fgd: true      

          # Extended Advanced Summaries
          vpdmean: true
          vpdmin: true
          vpdmax: true
          vpdrange: true
          petmean: true
          petmin: true
          petmax: true
          petrange: true
          cmimean: true  
          cmimin: true
          cmimax: true
          cmirange: true
          swb: true      
          hursmean: true 
          hursmin: true
          hursmax: true
          hursrange: true
          cltmean: true  
          cltmin: true
          cltmax: true
          cltrange: true
          rsdsmean: true 
          rsdsmin: true
          rsdsmax: true
          rsdsrange: true
          sfcWindmean: true 
